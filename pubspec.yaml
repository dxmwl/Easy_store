name: easy_store
description: "A free, open-source app store for GitHub releases - browse, discover, and install apps."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.8.1
  shared_preferences: ^2.3.4
  flutter_markdown: ^0.7.6+2
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true
